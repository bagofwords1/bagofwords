<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOW Artifact</title>

  <!-- Tailwind CSS -->
  <script src="/libs/tailwindcss-3.4.16.js"></script>

  <!-- React 18 -->
  <script crossorigin src="/libs/react-18.production.min.js"></script>
  <script crossorigin src="/libs/react-dom-18.production.min.js"></script>

  <!-- Babel Standalone for JSX transpilation -->
  <script src="/libs/babel-standalone.min.js"></script>

  <!-- ECharts (kept for backward compatibility with older artifacts) -->
  <script src="/libs/echarts-5.min.js"></script>

  <!-- Recharts (declarative React charting) -->
  <script src="/libs/react-is-18.production.min.js"></script>
  <script src="/libs/recharts-3.8.1.min.js"></script>
  <script>if(window.Recharts)Object.assign(window,Recharts);</script>

  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    /* Global loading overlay */
    #global-loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #9ca3af;
      z-index: 9999;
      transition: opacity 0.2s ease-out;
    }
    #global-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    /* Loading state */
    .artifact-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
    }
    .artifact-error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #ef4444;
      padding: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Global loading overlay - shown until data is received -->
  <div id="global-loader">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 2A10 10 0 1 0 22 12A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8A8 8 0 0 1 12 20Z" opacity=".5"/>
      <path fill="currentColor" d="M20 12h2A10 10 0 0 0 12 2V4A8 8 0 0 1 20 12Z">
        <animateTransform attributeName="transform" dur="1s" from="0 12 12" repeatCount="indefinite" to="360 12 12" type="rotate"/>
      </path>
    </svg>
  </div>

  <div id="root"></div>

  <script>
    // ===========================================
    // BOW Artifact Runtime - Data Bridge
    // ===========================================

    (function() {
      'use strict';

      // Store for artifact data received from parent (preserve if already injected for headless rendering)
      if (!window.ARTIFACT_DATA) {
        window.ARTIFACT_DATA = null;
      }
      window.ARTIFACT_READY = false;

      // Listen for data from parent window
      window.addEventListener('message', function(event) {
        // Handle data payload
        if (event.data && event.data.type === 'ARTIFACT_DATA') {
          window.ARTIFACT_DATA = event.data.payload;

          // Hide global loader
          var loader = document.getElementById('global-loader');
          if (loader) {
            loader.classList.add('hidden');
          }

          // Dispatch custom event for React components to listen to
          window.dispatchEvent(new CustomEvent('artifactdata', {
            detail: event.data.payload
          }));

          console.log('[Artifact] Received data:', Object.keys(event.data.payload));
        }
      });

      // Signal to parent that iframe is ready to receive data
      window.ARTIFACT_READY = true;

      try {
        window.parent.postMessage({ type: 'ARTIFACT_READY' }, '*');
        console.log('[Artifact] Ready signal sent to parent');
      } catch (e) {
        console.error('[Artifact] Failed to send ready signal:', e);
      }

      // Helper hook for React components
      window.useArtifactData = function() {
        const [data, setData] = React.useState(window.ARTIFACT_DATA);

        React.useEffect(function() {
          var handler = function(e) {
            setData(e.detail);
          };
          window.addEventListener('artifactdata', handler);

          // In case data was already received before component mounted
          if (window.ARTIFACT_DATA && !data) {
            setData(window.ARTIFACT_DATA);
          }

          return function() {
            window.removeEventListener('artifactdata', handler);
          };
        }, []);

        return data;
      };

      // LoadingSpinner React component - available globally for LLM-generated code
      window.LoadingSpinner = function(props) {
        var size = props && props.size ? props.size : 24;
        var className = props && props.className ? props.className : '';

        return React.createElement('svg', {
          xmlns: 'http://www.w3.org/2000/svg',
          width: size,
          height: size,
          viewBox: '0 0 24 24',
          className: className
        }, [
          React.createElement('path', {
            key: 'track',
            fill: 'currentColor',
            d: 'M12 2A10 10 0 1 0 22 12A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8A8 8 0 0 1 12 20Z',
            opacity: '.5'
          }),
          React.createElement('path', {
            key: 'spinner',
            fill: 'currentColor',
            d: 'M20 12h2A10 10 0 0 0 12 2V4A8 8 0 0 1 20 12Z'
          }, React.createElement('animateTransform', {
            attributeName: 'transform',
            dur: '1s',
            from: '0 12 12',
            repeatCount: 'indefinite',
            to: '360 12 12',
            type: 'rotate'
          }))
        ]);
      };

      // Global fmt() number formatter
      window.fmt = function(n, opts) {
        if (n == null) return '\u2014';
        if (typeof n !== 'number') return String(n);
        opts = opts || {};
        if (opts.currency) return new Intl.NumberFormat('en-US', { style: 'currency', currency: opts.currency === true ? 'USD' : opts.currency, maximumFractionDigits: opts.decimals != null ? opts.decimals : 0 }).format(n);
        if (opts.pct) return n.toFixed(1) + '%';
        if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(1) + 'B';
        if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
        return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      };
      // Global CustomTooltip for Recharts
      window.CustomTooltip = function(props) {
        if (!props.active || !props.payload || !props.payload.length) return null;
        var h = React.createElement;
        return h('div', { className: 'bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl border border-slate-700/50 text-sm' }, [
          h('p', { key: 'l', className: 'font-medium text-slate-300 mb-1' }, props.label),
        ].concat(props.payload.map(function(p, i) {
          return h('p', { key: i, className: 'flex items-center gap-2' }, [
            h('span', { key: 'd', className: 'w-2 h-2 rounded-full inline-block', style: { backgroundColor: p.color } }),
            h('span', { key: 'n', className: 'text-slate-400' }, p.name + ': '),
            h('span', { key: 'v', className: 'font-semibold' }, typeof p.value === 'number' ? p.value.toLocaleString() : p.value),
          ]);
        })));
      };
      // Global KPICard component
      window.KPICard = function(props) {
        var h = React.createElement;
        var color = props.color || '#3B82F6';
        return h('div', { className: 'relative bg-white rounded-2xl border border-slate-200 p-5 shadow-sm overflow-hidden ' + (props.className || '') }, [
          h('div', { key: 'bar', className: 'absolute inset-x-0 top-0 h-1', style: { background: 'linear-gradient(90deg, ' + color + ', ' + color + '99)' } }),
          h('p', { key: 't', className: 'text-xs font-medium text-slate-500 uppercase tracking-wider mb-1' }, props.title),
          h('p', { key: 'v', className: 'text-2xl font-semibold text-slate-900' }, props.value),
          props.subtitle ? h('p', { key: 's', className: 'text-sm text-slate-500 mt-1' }, props.subtitle) : null,
        ]);
      };
      // Global SectionCard wrapper
      window.SectionCard = function(props) {
        var h = React.createElement;
        return h('div', { className: 'bg-white rounded-2xl border border-slate-200 shadow-sm p-6 ' + (props.className || '') }, [
          props.title ? h('div', { key: 'hdr', className: 'mb-4' }, [
            h('h2', { key: 't', className: 'text-lg font-semibold text-slate-800' }, props.title),
            props.subtitle ? h('p', { key: 's', className: 'text-sm text-slate-500 mt-1' }, props.subtitle) : null,
          ]) : null,
          h('div', { key: 'body' }, props.children),
        ]);
      };

      // Error handler for uncaught errors
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('[Artifact Error]', msg, error);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div class="artifact-error"><div><strong>Error:</strong><br>' +
            (msg || 'Unknown error') + '</div></div>';
        }
        return false;
      };

    })();
  </script>

  <!-- LLM_GENERATED_CODE -->
</body>
</html>

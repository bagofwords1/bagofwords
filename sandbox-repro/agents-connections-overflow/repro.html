<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="./tailwind.js"></script>
<style>body{margin:0}</style>
</head>
<body class="bg-white">
<!-- Isolated reproduction of KnowledgeExplorer.vue connections footer (lines 219-245).
     Markup + classes copied verbatim; Vue directives expanded statically.
     Width + connection count are driven by ?w= and ?n= query params. -->
<div id="root" class="flex" style="height:120px"></div>

<script>
const q = new URLSearchParams(location.search);
const W = parseInt(q.get('w') || '300', 10);   // treeWidth (default 300, clamp 220-600)
const N = parseInt(q.get('n') || '8', 10);      // connections.length
const FIX = q.get('fix') === '1';               // apply the option-3 fix

// A tiny placeholder for <DataSourceIcon> (w-3.5 h-3.5)
const icon = `<svg class="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" fill="#6366f1"/></svg>`;

// Nuxt UI v2 <UTooltip> wraps its trigger slot in <div class="relative inline-flex">.
// That wrapper is what the real footer has around every icon/chip/new button.
const tip = (inner) => `<div class="relative inline-flex">${inner}</div>`;

const shown = Math.min(4, N);
let iconTips = '';
for (let i = 0; i < shown; i++) {
  iconTips += tip(`
    <button type="button" class="relative inline-flex items-center justify-center w-6 h-6 rounded-md border border-gray-200 hover:bg-gray-50">
      ${icon}
      <span class="absolute -bottom-0.5 -end-0.5 w-1.5 h-1.5 rounded-full bg-green-500"></span>
    </button>`);
}
// FIX (option 3): the icon preview becomes the only flexible/clipped child.
const iconButtons = FIX
  ? `<div class="flex items-center gap-2 min-w-0 shrink-[9999] overflow-hidden py-1 -my-1 pe-1 -me-1">${iconTips}</div>`
  : iconTips;
const sh = FIX ? 'shrink-0 ' : '';   // functional tail is pinned in the fixed version
const labelCls = FIX ? 'min-w-0 truncate ' : '';   // label yields last (truncates) at min width

const tipSh = (inner) => `<div class="relative inline-flex ${sh}">${inner}</div>`;

const plusChip = N > 4
  ? tipSh(`<button type="button" class="inline-flex items-center justify-center h-6 px-1.5 rounded-md border border-gray-200 text-[11px] font-medium text-gray-500 hover:bg-gray-50">+${N - 4}</button>`)
  : '';

const newBtn = N > 0
  ? tipSh(`<button type="button" class="inline-flex items-center justify-center w-6 h-6 rounded-md border border-dashed border-gray-300 text-gray-400 hover:bg-gray-50">
       <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2"/></svg>
     </button>`)
  : '';

const viewAll = N > 0
  ? `<button type="button" class="ms-auto ${sh}text-[11px] text-gray-400 hover:text-gray-700 whitespace-nowrap">View all</button>`
  : '';

document.getElementById('root').innerHTML = `
  <aside class="shrink-0 border-e border-gray-200 flex flex-col relative" style="width:${W}px">
    <div class="flex-1 flex items-end px-3 pb-1 text-[11px] text-gray-300">tree pane (width ${W}px)</div>

    <!-- Connections footer -->
    <div class="border-t border-gray-200 px-3 py-2 flex items-center gap-2">
      <span class="${labelCls}text-[11px] font-semibold uppercase tracking-wider text-gray-400 me-1">Connections</span>
      ${iconButtons}
      ${plusChip}
      ${newBtn}
      ${viewAll}
    </div>

    <!-- resize handle -->
    <div class="absolute top-0 end-0 h-full w-1 bg-gray-100"></div>
  </aside>

  <!-- detail pane sits flush against the aside border-e; anything that overflows
       the aside spills into / is overpainted by this pane -->
  <section class="flex-1 min-w-0 flex items-start justify-start p-3 bg-white">
    <span class="text-[12px] text-gray-300">detail pane →</span>
  </section>`;

// Report overflow numerically for the doc.
window.__measure = () => {
  const footer = document.querySelector('aside > .border-t');
  const aside = document.querySelector('aside');
  const va = document.querySelector('aside .ms-auto');
  const scrollW = footer.scrollWidth;
  const clientW = footer.clientWidth;
  const asideRight = aside.getBoundingClientRect().right;
  const vaRight = va ? va.getBoundingClientRect().right : null;
  return {
    footerDisplay: getComputedStyle(footer).display,
    footerScrollWidth: scrollW,
    footerClientWidth: clientW,
    overflowPx: scrollW - clientW,
    asideRight,
    viewAllRight: vaRight,
    viewAllSpillPx: vaRight ? +(vaRight - asideRight).toFixed(1) : null,
  };
};
</script>
</body>
</html>

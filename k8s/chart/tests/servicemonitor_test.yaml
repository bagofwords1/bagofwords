suite: test servicemonitor
templates:
  - servicemonitor.yaml
release:
  name: test-release
chart:
  appVersion: 0.0.1-test
set:
  postgresql.auth.username: test
  postgresql.auth.password: test
  postgresql.auth.database: testdb
tests:
  - it: is absent by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when enabled
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: test-release
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s

  - it: adds additionalLabels to metadata
    set:
      serviceMonitor.enabled: true
      serviceMonitor.additionalLabels.release: prometheus
    asserts:
      - equal:
          path: metadata.labels.release
          value: prometheus

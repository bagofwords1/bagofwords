suite: test deployment
templates:
  - deployment.yaml
release:
  name: test-release
chart:
  appVersion: 0.0.1-test
set:
  postgresql.auth.username: test
  postgresql.auth.password: test
  postgresql.auth.database: testdb
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: test-release
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: "^bagofwords-"
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.serviceAccountName
          value: bowapp
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: test-release

  - it: renders cpu from values not hardcoded
    set:
      resources.requests.cpu: 500m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m

  - it: has no uploads volume or init container by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 1
      - notExists:
          path: spec.template.spec.initContainers
      - notExists:
          path: spec.strategy

  - it: mounts the uploads volume when persistence is enabled
    set:
      persistence.uploads.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: uploads
            persistentVolumeClaim:
              claimName: test-release-uploads
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: uploads
            mountPath: /app/backend/uploads
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-uploads
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: uses an existing claim when provided
    set:
      persistence.uploads.enabled: true
      persistence.uploads.existingClaim: my-uploads
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: uploads
            persistentVolumeClaim:
              claimName: my-uploads

  - it: keeps an explicit strategy over the Recreate default
    set:
      persistence.uploads.enabled: true
      strategy.type: RollingUpdate
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: does not force Recreate for a ReadWriteMany volume
    set:
      persistence.uploads.enabled: true
      persistence.uploads.accessModes:
        - ReadWriteMany
    asserts:
      - notExists:
          path: spec.strategy

  - it: keeps user initContainers alongside the uploads init container
    set:
      persistence.uploads.enabled: true
      initContainers:
        - name: my-init
          image: busybox
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-uploads
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: my-init

  - it: fails with multiple replicas on a ReadWriteOnce volume
    set:
      persistence.uploads.enabled: true
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorPattern: "cannot be shared across pods"

  - it: fails with autoscaling on a ReadWriteOnce volume
    set:
      persistence.uploads.enabled: true
      autoscaling.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "cannot be shared across pods"

  - it: allows multiple replicas with a ReadWriteMany volume
    set:
      persistence.uploads.enabled: true
      persistence.uploads.accessModes:
        - ReadWriteMany
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

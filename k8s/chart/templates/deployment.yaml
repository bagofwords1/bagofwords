{{- $uploads := .Values.persistence.uploads -}}
{{- $uploadsRWX := has "ReadWriteMany" $uploads.accessModes -}}
{{- if and $uploads.enabled (not $uploadsRWX) }}
{{- if or (gt (int .Values.replicaCount) 1) .Values.autoscaling.enabled }}
{{- fail "persistence.uploads: a ReadWriteOnce uploads volume cannot be shared across pods. Set replicaCount=1 and autoscaling.enabled=false, or use a ReadWriteMany-capable storageClass and set persistence.uploads.accessModes=[ReadWriteMany]." }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bowapp.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bowapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "bowapp.selectorLabels" . | nindent 6 }}
  {{- if .Values.strategy }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- else if and $uploads.enabled (not $uploadsRWX) }}
  # A ReadWriteOnce uploads volume can't be attached to old and new pods at
  # once during a rolling update, so replace the pod instead.
  strategy:
    type: Recreate
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "bowapp.selectorLabels" . | nindent 8 }}
        app: {{ include "bowapp.name" . }}
        version: {{ .Chart.AppVersion | quote }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if or $uploads.enabled .Values.initContainers }}
      initContainers:
        {{- if $uploads.enabled }}
        # A fresh PVC mounts empty and root-owned, but the app runs as the
        # non-root "app" user and expects the uploads/* layout baked into the
        # image (hidden by the mount). Seed it before the app starts.
        - name: init-uploads
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - mkdir -p /uploads/files /uploads/branding /uploads/avatars && chown app:app /uploads /uploads/files /uploads/branding /uploads/avatars
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: uploads
              mountPath: /uploads
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "bowapp.name" . }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "bowapp.name" . }}
            {{- if not (empty .Values.config.secretRef) }}
            - secretRef:
                name: {{ .Values.config.secretRef }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            {{- if not (empty .Values.resources.limits.memory) }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: bow-config
              mountPath: /app/bow-config.yaml
              subPath: bowConfig
            {{- if $uploads.enabled }}
            - name: uploads
              mountPath: /app/backend/uploads
            {{- end }}
            {{- if .Values.database.auth.sslRootCert.secretName }}
            - name: db-ca-cert
              mountPath: /app/certs
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: bow-config
          configMap:
            name: {{ include "bowapp.name" . }}
        {{- if $uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ $uploads.existingClaim | default (printf "%s-uploads" (include "bowapp.name" .)) }}
        {{- end }}
        {{- if .Values.database.auth.sslRootCert.secretName }}
        - name: db-ca-cert
          secret:
            secretName: {{ .Values.database.auth.sslRootCert.secretName }}
            items:
              - key: {{ .Values.database.auth.sslRootCert.key }}
                path: rds-combined-ca-bundle.pem
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

image:
  tag: latest
  registry: docker.io
  repository: bagofwords/bagofwords
host: app.bagofwords.com
postgresql:
  auth:
    username: ""
    password: ""
    database: ""
    existingSecret: ""
  primary:
    persistence:
      size: 20Gi
    nodeSelector: {}

# Managed database with IAM auth (alternative to the bundled postgresql subchart).
# When database.auth.provider is not "password", the postgresql subchart values
# above are ignored and the app connects to the external managed database instead.
database:
  auth:
    provider: password   # password | aws_iam
    region: ""           # AWS only — e.g. "us-east-1"
    sslMode: ""          # e.g. "verify-full" (required for IAM auth)
    sslRootCert:
      secretName: ""     # K8s Secret with a custom CA cert (optional — image ships with public AWS RDS bundle)
      key: ""            # Key inside the Secret (e.g. "ca-bundle.pem")
  host: ""               # e.g. my-cluster.cluster-xxx.us-east-1.rds.amazonaws.com
  port: 5432
  username: ""           # DB user — must have GRANT rds_iam (AWS) or equivalent
  name: ""               # Database name
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false
    secretName: bowapp-cert
  # Example custom annotations:
  # annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  annotations: {}
serviceAccount:
  name: bowapp
  imagePullSecret: ""
  annotations: {}

# Application configuration.
#
# Sensitive fields (encryptionKey, googleClientSecret, smtp.password, licenseKey,
# oidcProviders[].clientSecret, ldap.bindPassword) should be provided via a
# Kubernetes Secret referenced by `config.secretRef`. Use the ${VAR} placeholder
# pattern (e.g. clientSecret: "${BOW_OIDC_OKTA_CLIENT_SECRET}") and put the real
# value in the Secret with the matching key. See README.md for details.
#
# Plaintext values are still accepted for backward compatibility, but they will
# land in a ConfigMap (not a Secret) and trigger a warning in helm NOTES.
config:
  secretRef: ""
  googleOauthEnabled: false
  googleClientId: ""
  googleClientSecret: ""
  encryptionKey: ""
  intercomEnabled: false
  telemetryEnabled: true
  baseUrl: ""
  authMode: "hybrid"   # hybrid | local_only | sso_only
  allowUninvitedSignups: false
  allowMultipleOrganizations: false
  verifyEmails: false
  uvicornWorkers: ""
  otel:
    enabled: false
    serviceName: "bagofwords-backend"
    tracesEndpoint: "http://localhost:4317"
    protocol: "grpc" # grpc or http/protobuf
    headers: "" # format: key1=value1,key2=value2

  # OpenID Connect providers (Okta, Microsoft Entra, Auth0, etc.).
  # `clientSecret` should always use the ${BOW_OIDC_<NAME>_CLIENT_SECRET}
  # placeholder pattern — the real secret is provided via config.secretRef.
  #
  # Example — Okta:
  # oidcProviders:
  #   - name: okta
  #     enabled: true
  #     issuer: https://YOUR_OKTA_DOMAIN.okta.com/oauth2/default
  #     clientId: "<okta-client-id>"
  #     clientSecret: "${BOW_OIDC_OKTA_CLIENT_SECRET}"
  #     scopes: ["openid", "profile", "email"]
  #     pkce: true
  #     clientAuthMethod: basic   # basic | post
  #     discovery: true
  #     uidClaim: sub
  #
  # Example — Microsoft Entra (Azure AD) with group sync:
  # oidcProviders:
  #   - name: entra
  #     enabled: true
  #     label: "Sign in with Microsoft"
  #     icon: microsoft
  #     issuer: https://login.microsoftonline.com/<tenant-id>/v2.0
  #     clientId: "<entra-client-id>"
  #     clientSecret: "${BOW_OIDC_ENTRA_CLIENT_SECRET}"
  #     scopes: ["openid", "profile", "email"]
  #     pkce: true
  #     clientAuthMethod: post
  #     discovery: true
  #     uidClaim: sub
  #     # Sync groups from id_token's `groups` claim into BOW Groups on login.
  #     syncGroups: true
  #     groupClaim: groups
  #     # Entra returns group UUIDs; resolve display names via Microsoft Graph.
  #     resolveGroupNames: true
  oidcProviders: []

  # LDAP / Active Directory.
  # bindPassword is NOT set here — provide it as BOW_LDAP_BIND_PASSWORD in
  # the Secret referenced by config.secretRef.
  ldap:
    enabled: false
    url: ""                                  # e.g. ldaps://ad.corp.com:636
    bindDn: ""                               # service account DN (optional)
    useSsl: true
    startTls: false
    baseDn: ""                               # e.g. dc=corp,dc=com
    userSearchBase: ""                       # defaults to baseDn when empty
    userSearchFilter: "(objectClass=person)"
    userEmailAttribute: "mail"
    userNameAttribute: "displayName"
    groupSearchBase: ""                      # defaults to baseDn when empty
    groupSearchFilter: "(objectClass=group)"
    groupNameAttribute: "cn"
    groupMemberAttribute: "member"            # "member" (AD/DN) or "memberUid" (OpenLDAP)
    groupMemberFormat: "dn"                  # "dn" or "uid"
    syncIntervalMinutes: 60
    autoProvisionUsers: false
    connectionTimeout: 10
    pageSize: 500

  # Enterprise license key. Prefer config.secretRef with key BOW_LICENSE_KEY.
  licenseKey: ""

  # SMTP — `enabled` is a Helm-only render gate (SMTPSettings has no `enabled`
  # field). Setting `host` also implicitly enables the block. `password` should
  # be provided via config.secretRef as BOW_SMTP_PASSWORD.
  smtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from_name: ""
    from_email: ""
    use_tls: true
    use_ssl: false
    use_credentials: true
    validate_certs: true



resources:
  requests:
    cpu: 2
    memory: 900Mi
  limits:
    # by default there is no memory limit
    # to set the memory limit, set --set resources.limits.memory=1Gi|2Gi|4Gi, etc...
    memory: ""

# -- Override for the resource name. Defaults to .Release.Name.
# Useful when deploying multiple releases of the same chart into one namespace.
nameOverride: ""

# -- Number of pod replicas.
replicaCount: 1

# -- Deployment strategy. Leave empty for Kubernetes default (RollingUpdate 25/25).
strategy: {}
# strategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxSurge: 1
#     maxUnavailable: 0

# -- Number of old ReplicaSets to retain.
revisionHistoryLimit: 2

# -- Seconds to wait for in-flight requests to drain on pod shutdown.
terminationGracePeriodSeconds: 30

# -- Node selector for the app pod. Does NOT affect the bundled PostgreSQL pod
# (use postgresql.primary.nodeSelector for that).
nodeSelector: {}

# -- Tolerations for the app pod.
tolerations: []

# -- Affinity rules for the app pod.
affinity: {}

# -- Topology spread constraints for the app pod.
topologySpreadConstraints: []

# -- Annotations added to every pod (not the Deployment metadata).
podAnnotations: {}

# -- Security context for the pod (fsGroup, runAsUser, etc.).
podSecurityContext: {}

# -- Security context for the main app container.
containerSecurityContext: {}

# -- Container lifecycle hooks (preStop / postStart).
lifecycle: {}
# lifecycle:
#   preStop:
#     exec:
#       command: ["/bin/sh", "-c", "sleep 5"]

# -- Init containers to run before the main app container.
initContainers: []

# -- Sidecar containers to run alongside the main app container.
extraContainers: []

# -- Extra environment variables injected into the main app container.
extraEnv: []
# extraEnv:
#   - name: MY_VAR
#     value: "foo"
#   - name: FROM_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key

# -- Extra envFrom sources (ConfigMap or Secret refs) added after the main ConfigMap/secretRef.
extraEnvFrom: []
# extraEnvFrom:
#   - configMapRef:
#       name: extra-config
#   - secretRef:
#       name: extra-secret

# -- Extra volumes to add to the pod.
extraVolumes: []

# -- Extra volume mounts to add to the main app container.
extraVolumeMounts: []

# -- Startup probe. Kubernetes will not route traffic or count the pod ready until this passes.
startupProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

# -- Readiness probe. Pod is removed from Service endpoints while this fails.
readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 1

# -- Liveness probe. Pod is restarted when this fails.
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 1

##########################################################
# Horizontal Pod Autoscaler
##########################################################
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

##########################################################
# Pod Disruption Budget
##########################################################
podDisruptionBudget:
  enabled: false
  minAvailable: "50%"
  # maxUnavailable: 1   # set this and clear minAvailable to use maxUnavailable instead

##########################################################
# Network Policy
##########################################################
networkPolicy:
  enabled: false
  # ingress and egress are raw Kubernetes NetworkPolicy rule objects.
  ingress: []
  # ingress:
  #   - from:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: ingress-nginx
  #     ports:
  #     - protocol: TCP
  #       port: 3000
  egress: []

##########################################################
# Prometheus ServiceMonitor
##########################################################
serviceMonitor:
  enabled: false
  interval: "30s"
  path: /metrics
  port: http
  # additionalLabels must match your Prometheus Operator's serviceMonitorSelector.
  additionalLabels: {}
  # additionalLabels:
  #   release: prometheus

image:
  tag: latest
  registry: docker.io
  repository: bagofwords/bagofwords
host: app.bagofwords.com
postgresql:
  auth:
    username: ""
    password: ""
    database: ""
    existingSecret: ""
  primary:
    persistence:
      size: 20Gi
    nodeSelector: {}

# Managed database with IAM auth (alternative to the bundled postgresql subchart).
# When database.auth.provider is not "password", the postgresql subchart values
# above are ignored and the app connects to the external managed database instead.
database:
  auth:
    provider: password   # password | aws_iam
    region: ""           # AWS only — e.g. "us-east-1"
    sslMode: ""          # e.g. "verify-full" (required for IAM auth)
    sslRootCert:
      secretName: ""     # K8s Secret with a custom CA cert (optional — image ships with public AWS RDS bundle)
      key: ""            # Key inside the Secret (e.g. "ca-bundle.pem")
  host: ""               # e.g. my-cluster.cluster-xxx.us-east-1.rds.amazonaws.com
  port: 5432
  username: ""           # DB user — must have GRANT rds_iam (AWS) or equivalent
  name: ""               # Database name
ingress:
  enabled: true
  className: nginx
  tls: true
  # Example custom annotations:
  # annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  annotations: {}
serviceAccount:
  name: bowapp
  imagePullSecret: ""
  annotations: {}
config:
  secretRef: ""
  googleOauthEnabled: false
  googleClientId: ""
  googleClientSecret: ""
  encryptionKey: ""
  intercomEnabled: false
  baseUrl: ""
  authMode: "hybrid"
  allowUninvitedSignups: false
  allowMultipleOrganizations: false
  verifyEmails: false
  # List of OIDC providers to enable (empty by default)
  # Example:
  # oidcProviders:
  #   - name: okta
  #     enabled: true
  #     issuer: https://YOUR_OKTA_DOMAIN.okta.com/oauth2/default
  #     clientId: "${BOW_OIDC_OKTA_CLIENT_ID}"   # or plain value
  #     clientSecret: "${BOW_OIDC_OKTA_CLIENT_SECRET}" # or plain value
  #     scopes: ["openid", "profile", "email"]
  #     pkce: true
  #     clientAuthMethod: basic   # or post
  #     discovery: true
  #     uidClaim: sub
  #     redirectPath: /api/auth/okta/callback
  #     extraAuthorizeParams: {}
  #     extraTokenParams: {}
  oidcProviders: []
  # Enterprise license key (optional)
  # For security, prefer using secretRef to store the license key
  licenseKey: ""
  smtp:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from_name: ""
    from_email: ""
    use_tls: true
    use_ssl: false
    use_credentials: true
    validate_certs: true



resources:
  requests:
    cpu: 2
    memory: 900Mi
  limits:
    # by default there is no memory limit
    # to set the memory limit, set --set resources.limits.memory=1Gi|2Gi|4Gi, etc...
    memory: ""

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /* Reproduces the KnowledgeExplorer connections footer (KnowledgeExplorer.vue:159).
     ?empty=1 -> no connections/agents yet (the case under test)
     default  -> some connections present */
  * { box-sizing: border-box; margin: 0; padding: 0; font: 13px sans-serif; }
  .aside { width: 280px; height: 100vh; display: flex; flex-direction: column;
           border-right: 1px solid #e5e7eb; }
  .tree { flex: 1 1 0%; overflow: auto; padding: 8px; color: #9ca3af; }
  /* Connections footer */
  .footer { border-top: 1px solid #e5e7eb; padding: 8px 12px;
            display: flex; align-items: center; gap: 8px; }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase;
           letter-spacing: .05em; color: #9ca3af; margin-right: 4px; }
  .chip { width: 24px; height: 24px; border: 1px solid #e5e7eb; border-radius: 6px;
          display: inline-flex; align-items: center; justify-content: center; }
  /* compact "+" — only when connections exist */
  .plus-icon { width: 24px; height: 24px; border: 1px dashed #d1d5db; border-radius: 6px;
               color: #9ca3af; display: inline-flex; align-items: center; justify-content: center; }
  /* labeled CTA — only when no connections (the fix) */
  .cta { height: 24px; padding: 0 8px; border: 1px dashed #d1d5db; border-radius: 6px;
         font-size: 11px; font-weight: 500; color: #6b7280;
         display: inline-flex; align-items: center; gap: 4px; }
  .viewall { margin-left: auto; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
  <div class="aside">
    <div class="tree" id="tree">Agents</div>
    <div class="footer">
      <span class="label">Connections</span>
      <span class="chip" id="chip" style="display:none">DWH</span>
      <span class="plus-icon" id="plusIcon" style="display:none">+</span>
      <button class="cta" id="cta" style="display:none">+ Add connection</button>
      <span class="viewall" id="viewall" style="display:none">View all</span>
    </div>
  </div>
  <script>
    var empty = new URLSearchParams(location.search).get('empty') === '1';
    var canCreate = true; // canCreateDataSource
    var connectionsLength = empty ? 0 : 2;
    document.getElementById('tree').textContent = empty ? 'Agents — no agents yet' : 'Agents — Sales';
    // Mirror the exact v-if conditions from KnowledgeExplorer.vue:159-178
    document.getElementById('chip').style.display = connectionsLength > 0 ? '' : 'none';
    document.getElementById('plusIcon').style.display = (canCreate && connectionsLength) ? '' : 'none';
    document.getElementById('cta').style.display = (canCreate && connectionsLength === 0) ? '' : 'none';
    document.getElementById('viewall').style.display = connectionsLength ? '' : 'none';
  </script>
</body>
</html>

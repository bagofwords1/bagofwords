<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /* Models layouts/default.vue + KnowledgeExplorer.vue. The window is a fixed
     800px "viewport" so the test exercises the height arithmetic (subtract the
     banner) without the headless 100vh-vs-innerHeight scrollbar quirk.
     ?fixed=1 -> banner-aware height (the fix); default -> full height (the bug). */
  * { box-sizing: border-box; margin: 0; padding: 0; font: 13px sans-serif; }
  :root { --vh: 800px; --banner: 40px; }   /* viewport height + banner height */
  .viewport { height: var(--vh); overflow: auto; position: relative; }
  /* Fixed top banner — layouts/default.vue:15 (h-10 reserved) */
  .banner { position: absolute; top: 0; left: 0; right: 0; height: var(--banner);
            z-index: 1000; background: #f59e0b; color: #fff;
            display: flex; align-items: center; justify-content: center; }
  /* Content wrapper — layouts/default.vue:236 (min-h-screen + pt-10 when banner) */
  .content { min-height: var(--vh); padding-top: var(--banner); }
  /* KnowledgeExplorer root — full height (bug) vs viewport-minus-banner (fix) */
  .explorer { display: flex; flex-direction: column; height: var(--vh); }
  .explorer.fixed { height: calc(var(--vh) - var(--banner)); }
  .ke-header { flex: 0 0 auto; padding: 12px; border-bottom: 1px solid #eee; }
  .ke-body { flex: 1 1 0%; min-height: 0; display: flex; border-top: 1px solid #e5e7eb; }
  .aside { width: 280px; flex-shrink: 0; border-right: 1px solid #e5e7eb;
           display: flex; flex-direction: column; }
  .search { flex: 0 0 auto; padding: 10px; }
  .tree { flex: 1 1 0%; min-height: 0; overflow-y: auto; padding: 8px; color: #9ca3af; }
  .row { height: 28px; }
  /* Connections footer — KnowledgeExplorer.vue:159 */
  .conn-footer { flex: 0 0 auto; border-top: 1px solid #e5e7eb; padding: 8px 12px;
                 display: flex; align-items: center; gap: 8px; background: #fff; }
  .label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #9ca3af; }
  .cta { height: 24px; padding: 0 8px; border: 1px dashed #d1d5db; border-radius: 6px;
         font-size: 11px; color: #6b7280; display: inline-flex; align-items: center; }
</style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="banner">License expires in 27 days</div>
    <div class="content">
      <div class="explorer" id="explorer">
        <div class="ke-header">Agents — Configure your agents…</div>
        <div class="ke-body">
          <div class="aside">
            <div class="search">Search everything…</div>
            <div class="tree" id="tree"></div>
            <div class="conn-footer" id="footer">
              <span class="label">Connections</span>
              <button class="cta" id="cta">+ Add connection</button>
            </div>
          </div>
          <div style="flex:1"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    var tree = document.getElementById('tree');
    for (var i = 0; i < 4; i++) { var d = document.createElement('div'); d.className='row'; d.textContent='Agent ' + i; tree.appendChild(d); }
    if (new URLSearchParams(location.search).get('fixed') === '1') {
      document.getElementById('explorer').classList.add('fixed');
    }
  </script>
</body>
</html>

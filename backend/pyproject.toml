[project]
name = "bagofwords"
version = "0.1.0"
description = "Bag of Words — AI data tool backend"
authors = []
requires-python = ">=3.12,<3.15"
dependencies = [
    "fastapi>=0.123.1,<0.124",
    "uvicorn[standard]>=0.31.1,<0.32",
    "starlette>=0.50.0",
    "pydantic>=2.11,<3",
    "pydantic-settings>=2.7,<3",
    "python-multipart>=0.0.27,<0.1",
    "email-validator>=2.1.2,<3",
    "jinja2>=3.1.6,<4",
    "fastapi-users[sqlalchemy]>=15.0.5,<16",
    "argon2-cffi>=23.1.0,<24",
    "bcrypt>=4.1.2,<5",
    "pwdlib[argon2]>=0.3.0,<0.4",
    "pyjwt>=2.13,<3",
    "httpx-oauth>=0.16.1,<0.17",
    "cryptography>=46.0,<47",
    "sqlalchemy>=2.0.29,<3",
    "alembic>=1.13.1,<2",
    "asyncpg>=0.29.0,<0.30",
    "psycopg2-binary>=2.9.9,<3",
    "aiosqlite>=0.20.0,<0.21",

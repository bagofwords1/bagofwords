name: Build and Push Docker Image

on:
  workflow_dispatch:
  repository_dispatch:
    types: [e2e-tests-passed]

permissions:
  contents: read
  security-events: write

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'bagofwords/bagofwords' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get VERSION and DATE
        id: version
        run: |
          VERSION=$(cat VERSION)
          DATE=$(date +'%Y%m%d')
          echo "version_tag=${VERSION}-${DATE}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet || true
          docker system prune -af --volumes || true
          docker buildx prune -af || true

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:cache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:cache-${{ env.PLATFORM_PAIR }},mode=max
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  scan:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-linux-amd64
          path: /tmp/digests

      - name: Resolve amd64 digest
        id: digest
        run: |
          DIGEST=$(ls /tmp/digests | head -1)
          echo "ref=${{ env.DOCKER_IMAGE }}@sha256:${DIGEST}" >> $GITHUB_OUTPUT

      - name: Trivy scan summary (stdout)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.digest.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.digest.outputs.ref }}
          format: sarif
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version_tag }} \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)
